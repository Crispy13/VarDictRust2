name: Ignore Audit

on:
  workflow_dispatch:
  schedule:
    - cron: '30 3 * * *'

concurrency:
  group: ignore-audit
  cancel-in-progress: true

jobs:
  ignore-audit:
    name: Audit Ignored Tests
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        env:
          VARDICT_IMPL: rust
        run: cargo build --profile debug-release

      - name: Audit ignored tests
        env:
          VARDICT_IMPL: rust
        run: bash scripts/check_ignored_tests.sh