name: Sweep Tests (Tier 2)
on:
  workflow_dispatch:
    inputs:
      module:
        description: 'Module to sweep'
        required: true
        type: choice
        options: [cigar_modifier, cigar_parser, realigner, sam_file_parser, sv_processor, tovars, e2e, config_e2e, e2e_sweep]
      shard_scope:
        description: 'Shard-scoped (na12878_exome only, fast)'
        required: false
        type: boolean
        default: true
      e2e_sweep_tag:
        description: 'E2E-sweep BAM tag (used only when module=e2e_sweep)'
        required: false
        type: choice
        options: [all, hg002, na12878_exome, na12878_lowcov]
        default: all
  schedule:
    - cron: '0 2 * * *'  # Nightly at 2 AM UTC — shard-scoped

jobs:
  sweep:
    name: Sweep — ${{ inputs.module || 'all' }}
    runs-on: self-hosted
    strategy:
      matrix:
        shard: ["0/1"]
    env:
      RAYON_NUM_THREADS: 10
      VARDICT_SWEEP_SHARD_SCOPE: ${{ (github.event_name == 'schedule' || inputs.shard_scope) && '1' || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      # NOTE: Self-hosted runner must have tmp/sweep_fixtures/ (~240GB)

      - name: Config E2E surface gate
        if: github.event_name == 'schedule' || inputs.module == 'config_e2e'
        env:
          VARDICT_IMPL: rust
        run: bash scripts/config_e2e_surface_gate.sh

      - name: Generate E2E golden fixtures
        if: github.event_name == 'schedule' || inputs.module == 'e2e' || inputs.module == 'config_e2e'
        env:
          VARDICT_IMPL: rust
          VARDICT_CELL_SHARD: ${{ matrix.shard }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ inputs.module }}" = "config_e2e" ]; then
            bash scripts/gen_e2e_golden_tsv.sh --all-configs
          else
            bash scripts/gen_e2e_golden_tsv.sh --config default
          fi

      - name: Run sweep
        env:
          VARDICT_IMPL: rust
          VARDICT_CELL_SHARD: ${{ matrix.shard }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # Nightly: run all modules shard-scoped
            for mod in cigar_modifier cigar_parser realigner sam_file_parser sv_processor tovars; do
              echo "=== Sweep: $mod ==="
              cargo test --profile debug-release --test parity_sweep_suite "${mod}_sweep::" -- --include-ignored --nocapture --test-threads=1
            done
            echo "=== E2E: full ==="
            cargo test --profile debug-release --test parity_e2e -- --include-ignored --test-threads=1 --nocapture
            echo "=== Config E2E: full ==="
            cargo test --profile debug-release --test parity_config_e2e_cells -- --include-ignored --test-threads=10
            echo "=== E2E sweep: shard 0/4 ==="
            VARDICT_E2E_SWEEP_SHARD="0/4" cargo test --profile debug-release --test parity_e2e_sweep -- --include-ignored --test-threads=1 --nocapture
          elif [ "${{ inputs.module }}" = "e2e" ]; then
            cargo test --profile debug-release --test parity_e2e -- --include-ignored --test-threads=1 --nocapture
          elif [ "${{ inputs.module }}" = "config_e2e" ]; then
            cargo test --profile debug-release --test parity_config_e2e_cells -- --include-ignored --test-threads=10
          elif [ "${{ inputs.module }}" = "e2e_sweep" ]; then
            export VARDICT_E2E_SWEEP_SHARD="${{ inputs.shard_scope && '0/4' || '' }}"
            tag="${{ inputs.e2e_sweep_tag }}"
            if [ "$tag" = "all" ] || [ -z "$tag" ]; then
              cargo test --profile debug-release --test parity_e2e_sweep -- --include-ignored --test-threads=1 --nocapture
            else
              cargo test --profile debug-release --test parity_e2e_sweep "${tag}_sweep::" -- --include-ignored --test-threads=1 --nocapture
            fi
          else
            cargo test --profile debug-release --test parity_sweep_suite "${{ inputs.module }}_sweep::" -- --include-ignored --nocapture --test-threads=1
          fi
